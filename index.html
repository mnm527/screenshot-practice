<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>しらチャレ練習</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
      background: #12121f;
      color: #eee;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: #1c1c32;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a50;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 15px; color: #ff6b8a; letter-spacing: 0.05em; }
    .status-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: #2a2a50;
      color: #666;
      transition: background 0.3s, color 0.3s;
    }
    .status-badge.active { background: #1a3a2a; color: #4ecdc4; }

    /* ── Settings ── */
    .settings {
      background: #1c1c32;
      padding: 10px 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid #2a2a50;
    }
    .setting-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #999;
    }
    select {
      background: #0e0e22;
      color: #eee;
      border: 1px solid #3a3a60;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      -webkit-appearance: none;
    }

    /* ── Content area ── */
    .content-area { padding: 14px 14px 100px; }

    .content-card {
      background: #1c1c32;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-left: 4px solid transparent;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .content-card:active { opacity: 0.75; }
    .content-card.visible { opacity: 1; transform: translateY(0); }
    .content-card.news  { border-color: #ff6b8a; }
    .content-card.song  { border-color: #f5a623; }
    .content-card.topic { border-color: #4ecdc4; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-header-left { flex: 1; min-width: 0; }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      opacity: 0.75;
    }
    .news  .card-label { color: #ff6b8a; }
    .song  .card-label { color: #f5a623; }
    .topic .card-label { color: #4ecdc4; }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 5px;
    }
    .card-sub {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }
    .card-chevron {
      font-size: 14px;
      color: #444;
      margin-top: 2px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .content-card:active .card-chevron { color: #888; }

    /* ── Control button ── */
    .control-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ff6b8a, #e94560);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px 48px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.45);
      transition: transform 0.1s, box-shadow 0.1s, background 0.3s;
      letter-spacing: 0.05em;
      z-index: 20;
      white-space: nowrap;
    }
    .control-btn:active {
      transform: translateX(-50%) scale(0.95);
      box-shadow: 0 3px 10px rgba(233, 69, 96, 0.35);
    }
    .control-btn.running {
      background: linear-gradient(135deg, #555, #333);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    /* ── Character overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      pointer-events: none;
      background: rgba(255, 248, 220, 0);
    }
    /* background fades in/out independently */
    .overlay.playing {
      animation: overlay-bg var(--chara-dur, 1.5s) ease forwards;
    }
    @keyframes overlay-bg {
      0%   { background: rgba(255, 248, 220, 0); }
      15%  { background: rgba(255, 248, 220, 0.93); }
      75%  { background: rgba(255, 248, 220, 0.93); }
      100% { background: rgba(255, 248, 220, 0); }
    }

    /* character itself slides in from right, holds, exits to left */
    .chara-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform, opacity;
      opacity: 0;
    }
    .chara-wrap.playing {
      animation: chara-slide var(--chara-dur, 1.5s) cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes chara-slide {
      /* enter from right */
      0%   { opacity: 0; transform: translateX(90vw) rotate(22deg) scale(0.5); }
      /* land with bounce */
      26%  { opacity: 1; transform: translateX(-16px) rotate(-7deg) scale(1.13); }
      34%  { opacity: 1; transform: translateX(8px)  rotate(4deg)  scale(0.95); }
      40%  { opacity: 1; transform: translateX(-4px) rotate(-2deg) scale(1.03); }
      /* hold center — this is the screenshot window */
      46%  { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
      68%  { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
      /* wind-up before exit */
      74%  { opacity: 1; transform: translateX(12px) rotate(5deg) scale(1.07); }
      /* exit to left */
      100% { opacity: 0; transform: translateX(-90vw) rotate(-25deg) scale(0.5); }
    }

    .chara-svg { width: 200px; height: 220px; }

    .chara-label {
      margin-top: 10px;
      font-size: 17px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.05em;
      opacity: 0;
    }
    .chara-wrap.playing .chara-label {
      animation: label-fade var(--chara-dur, 1.5s) ease forwards;
    }
    @keyframes label-fade {
      0%  { opacity: 0; }
      30% { opacity: 1; }
      70% { opacity: 1; }
      90% { opacity: 0; }
    }

    /* ── Detail modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 201;
      background: #1c1c32;
      border-radius: 20px 20px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 16px);
      max-height: 80dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .modal-sheet.open {
      transform: translateY(0);
      pointer-events: auto;
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: #3a3a60;
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .modal-inner { padding: 16px 20px 32px; }
    .modal-type-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 13px;
      color: #aaa;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .modal-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .modal-detail {
      font-size: 14px;
      line-height: 1.8;
      color: #ccc;
      margin-bottom: 18px;
    }
    .modal-points {
      list-style: none;
      margin-bottom: 18px;
    }
    .modal-points li {
      font-size: 13px;
      color: #bbb;
      line-height: 1.7;
      padding: 6px 0 6px 18px;
      position: relative;
      border-bottom: 1px solid #2a2a50;
    }
    .modal-points li:last-child { border-bottom: none; }
    .modal-points li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #555;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .modal-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: #2a2a50;
      color: #888;
    }
  </style>
</head>

<div class="modal-sheet" id="modalSheet">

</div>

  const typeLabels = { news: '📰 今日のニュース', song: '🎵 今週の人気曲', topic: '💬 雑談ネタ' };
  const typeColors = { news: '#ff6b8a', song: '#f5a623', topic: '#4ecdc4' };
  const pointsHeadings = { news: '💡 配信で使えるポイント', song: '🎤 知っておきたいこと', topic: '💬 配信での活用ヒント' };
  const detailHeadings = { news: '📋 詳細', song: '📋 楽曲について', topic: '📋 ネタ解説' };
  const types = ['news', 'song', 'topic'];

  let isRunning = false;
  let contentTimer = null;
  let characterTimer = null;
  let cardEls = {};
  let idxMap = { news: 0, song: 0, topic: 0 };

  // ── Cards ──
  function initCards() {
    const area = document.getElementById('contentArea');
    area.innerHTML = '';
    types.forEach(type => {
      const el = document.createElement('div');
      el.className = `content-card ${type}`;
      el.innerHTML = `
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-label">${typeLabels[type]}</div>
            <div class="card-title" id="${type}-title"></div>
            <div class="card-sub" id="${type}-sub"></div>
          </div>
          <div class="card-chevron">›</div>
        </div>
      `;
      el.addEventListener('click', () => openModal(type));
      area.appendChild(el);
      cardEls[type] = el;
    });
    const spacer = document.createElement('div');
    spacer.style.height = '90px';
    area.appendChild(spacer);
    updateAllCards();
  }

  function updateAllCards() {
    types.forEach(type => updateCard(type, false));
  }

  function updateCard(type, animate = true) {
    const el = cardEls[type];
    const item = contents[type][idxMap[type]];
    if (animate) {
      el.classList.remove('visible');
      setTimeout(() => {
        document.getElementById(`${type}-title`).textContent = item.title;
        document.getElementById(`${type}-sub`).textContent = item.sub;
        el.classList.add('visible');
      }, 80);
    } else {
      document.getElementById(`${type}-title`).textContent = item.title;
      document.getElementById(`${type}-sub`).textContent = item.sub;
      requestAnimationFrame(() => el.classList.add('visible'));
    }
  }

  function cycleRandomCard() {
    const type = types[Math.floor(Math.random() * types.length)];
    idxMap[type] = (idxMap[type] + 1) % contents[type].length;
    updateCard(type, true);
  }

  // ── Modal ──
  function openModal(type) {
    const item = contents[type][idxMap[type]];
    const color = typeColors[type];

    const labelEl = document.getElementById('modalTypeLabel');
    labelEl.textContent = typeLabels[type];
    labelEl.style.color = color;

    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalSub').textContent = item.sub;

    document.getElementById('modalDetailLabel').textContent = detailHeadings[type];
    document.getElementById('modalDetailLabel').style.color = color;
    document.getElementById('modalDetail').textContent = item.detail;

    document.getElementById('modalPointsLabel').textContent = pointsHeadings[type];
    document.getElementById('modalPointsLabel').style.color = color;
    const ul = document.getElementById('modalPoints');
    ul.innerHTML = '';
    item.points.forEach(p => {
      const li = document.createElement('li');
      li.textContent = p;
      ul.appendChild(li);
    });

    const tagsEl = document.getElementById('modalTags');
    tagsEl.innerHTML = '';
    item.tags.forEach(t => {
      const span = document.createElement('span');
      span.className = 'modal-tag';
      span.textContent = t;
      tagsEl.appendChild(span);
    });

    document.getElementById('modalBackdrop').classList.add('open');
    document.getElementById('modalSheet').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.getElementById('modalSheet').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Character ──
  function getInterval() {
    const ranges = { short: [5000, 15000], medium: [10000, 25000], long: [20000, 40000] };
    const [mn, mx] = ranges[document.getElementById('intervalSetting').value];
    return Math.random() * (mx - mn) + mn;
  }

  function showCharacter() {
    const dur = parseInt(document.getElementById('durationSetting').value);
    const overlay = document.getElementById('overlay');
    const wrap = document.getElementById('charaWrap');

    overlay.style.setProperty('--chara-dur', `${dur}ms`);
    wrap.style.setProperty('--chara-dur', `${dur}ms`);

    // reset then trigger
    overlay.classList.remove('playing');
    wrap.classList.remove('playing');
    void overlay.offsetWidth; // reflow to restart animation

    overlay.classList.add('playing');
    wrap.classList.add('playing');

    wrap.addEventListener('animationend', function handler() {
      overlay.classList.remove('playing');
      wrap.classList.remove('playing');
      wrap.removeEventListener('animationend', handler);
      if (isRunning) scheduleCharacter();
    }, { once: true });
  }

  function scheduleCharacter() {
    characterTimer = setTimeout(showCharacter, getInterval());
  }

  // ── Practice control ──
  function togglePractice() {
    isRunning ? stopPractice() : startPractice();
  }

  function startPractice() {
    isRunning = true;
    document.getElementById('controlBtn').textContent = '練習停止';
    document.getElementById('controlBtn').classList.add('running');
    document.getElementById('statusBadge').textContent = '練習中';
    document.getElementById('statusBadge').classList.add('active');
    contentTimer = setInterval(cycleRandomCard, 11000);
    scheduleCharacter();
  }

  function stopPractice() {
    isRunning = false;
    clearInterval(contentTimer);
    clearTimeout(characterTimer);
    const overlay = document.getElementById('overlay');
    const wrap = document.getElementById('charaWrap');
    overlay.classList.remove('playing');
    wrap.classList.remove('playing');
    document.getElementById('controlBtn').textContent = '練習開始';
    document.getElementById('controlBtn').classList.remove('running');
    document.getElementById('statusBadge').textContent = '停止中';
    document.getElementById('statusBadge').classList.remove('active');
  }

  initCards();
</script>
